<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --card-border: #2a2d37;

  --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.container { max-width:1400px; margin:0 auto; padding:20px; }

/* Header */
.header { display:flex; justify-content:space-between; align-items:center; padding:24px 0; border-bottom:1px solid var(--card-border); margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:1.5rem; font-weight:600; }
.header h1 span { color:var(--accent); }
.header-meta { display:flex; align-items:center; gap:16px; }
.health-badge { padding:6px 16px; border-radius:20px; font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
.health-badge.yellow { background:rgba(234,179,8,0.15); color:var(--yellow); border:1px solid rgba(234,179,8,0.3); }
.health-badge.red { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
.health-badge.green { background:rgba(34,197,94,0.15); color:var(--green); border:1px solid rgba(34,197,94,0.3); }
.date-range { color:var(--text-dim); font-size:0.85rem; }

/* Toggle */
.toggle-row { display:flex; gap:8px; margin-bottom:24px; }
.toggle-btn { padding:8px 20px; border-radius:8px; border:1px solid var(--card-border); background:var(--card); color:var(--text-dim); cursor:pointer; font-size:0.85rem; transition:all 0.2s; }
.toggle-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.toggle-btn:hover:not(.active) { border-color:var(--accent); color:var(--text); }

/* KPI Cards */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.kpi-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:20px; }
.kpi-card .label { font-size:0.78rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
.kpi-card .value { font-size:2rem; font-weight:700; }
.kpi-card .value.red { color:var(--red); }
.kpi-card .value.orange { color:var(--orange); }
.kpi-card .value.green { color:var(--green); }
.kpi-card .sub { font-size:0.78rem; color:var(--text-muted); margin-top:4px; }

/* Chart containers */
.charts-row { display:grid; grid-template-columns:3fr 2fr; gap:20px; margin-bottom:28px; }
.chart-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:20px; }
.chart-card h3 { font-size:0.95rem; margin-bottom:16px; font-weight:500; }
.chart-wrap { position:relative; width:100%; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:0; border-bottom:2px solid var(--card-border); }
.tab-btn { padding:10px 20px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.85rem; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-btn:hover:not(.active) { color:var(--text); }
.tab-content { display:none; }
.tab-content.active { display:block; }
.table-section { background:var(--card); border:1px solid var(--card-border); border-radius:0 0 12px 12px; margin-bottom:28px; overflow:hidden; }

/* Filters */
.filters-row { display:flex; gap:12px; padding:16px 20px; border-bottom:1px solid var(--card-border); flex-wrap:wrap; }
.filter-select { background:var(--bg); color:var(--text); border:1px solid var(--card-border); border-radius:6px; padding:6px 12px; font-size:0.8rem; cursor:pointer; }
.filter-select:focus { outline:none; border-color:var(--accent); }

/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:0.83rem; }
.data-table th { text-align:left; padding:12px 16px; color:var(--text-dim); font-weight:500; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; cursor:pointer; user-select:none; white-space:nowrap; border-bottom:1px solid var(--card-border); }
.data-table th:hover { color:var(--accent); }
.data-table th .sort-arrow { margin-left:4px; font-size:0.7rem; }
.data-table td { padding:10px 16px; border-bottom:1px solid rgba(42,45,55,0.5); }
.data-table tr:hover { background:rgba(74,158,255,0.04); }
.data-table a { color:var(--accent); text-decoration:none; }
.data-table a:hover { text-decoration:underline; }

/* Badges */
.badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:0.72rem; font-weight:600; white-space:nowrap; }
.badge.sev1, .badge.blocker, .badge.high-risk { background:rgba(239,68,68,0.15); color:var(--red); }
.badge.sev2, .badge.critical { background:rgba(245,158,11,0.15); color:var(--orange); }
.badge.high { background:rgba(245,158,11,0.1); color:#fb923c; }
.badge.medium { background:rgba(148,163,184,0.15); color:var(--text-dim); }
.badge.medium-risk { background:rgba(234,179,8,0.15); color:var(--yellow); }
.badge.low-risk { background:rgba(34,197,94,0.15); color:var(--green); }
.badge.open { background:rgba(239,68,68,0.1); color:#f87171; }
.badge.closed, .badge.done { background:rgba(34,197,94,0.1); color:var(--green); }
.badge.investigating { background:rgba(74,158,255,0.1); color:var(--accent); }
.badge.backlog { background:rgba(148,163,184,0.1); color:var(--text-muted); }
.badge.escalation { background:rgba(168,85,247,0.15); color:#a855f7; }
.badge.incident-type { background:rgba(239,68,68,0.12); color:#f87171; }
.badge.slo-type { background:rgba(74,158,255,0.1); color:var(--accent); }
.badge.ready { background:rgba(168,85,247,0.1); color:#c084fc; }
.badge.in-progress { background:rgba(74,158,255,0.15); color:var(--accent); }

/* Context rows (pre-period / resolved) */
.data-table tr.context-row { opacity:0.5; }
.data-table tr.context-row:hover { opacity:0.75; }
.context-label { font-size:0.65rem; color:var(--text-muted); font-style:italic; margin-left:6px; }

/* Component Health */
.component-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:28px; }
.comp-card { background:var(--card); border:1px solid var(--card-border); border-radius:12px; padding:16px 20px; cursor:pointer; transition:all 0.2s; }
.comp-card:hover { border-color:var(--accent); }
.comp-card-header { display:flex; align-items:center; gap:10px; }
.health-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.health-dot.green { background:var(--green); box-shadow:0 0 6px rgba(34,197,94,0.4); }
.health-dot.yellow { background:var(--yellow); box-shadow:0 0 6px rgba(234,179,8,0.4); }
.health-dot.red { background:var(--red); box-shadow:0 0 6px rgba(239,68,68,0.4); }
.comp-name { font-weight:500; font-size:0.9rem; flex:1; }
.trend-arrow { font-size:0.85rem; }
.trend-arrow.degrading { color:var(--red); }
.trend-arrow.stable { color:var(--text-dim); }
.trend-arrow.stable-elevated { color:var(--orange); }
.trend-arrow.improving { color:var(--green); }
.comp-stats { display:flex; gap:16px; margin-top:10px; font-size:0.78rem; color:var(--text-dim); }
.comp-stats span strong { color:var(--text); }
.comp-details { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--card-border); font-size:0.8rem; color:var(--text-dim); line-height:1.8; }
.comp-card.expanded .comp-details { display:block; }
.comp-card .expand-hint { font-size:0.7rem; color:var(--text-muted); margin-top:8px; }
.comp-sparkline { height:45px; margin-top:10px; position:relative; }

.section-title { font-size:1.1rem; font-weight:600; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--card-border); }

/* Footer */
.footer { text-align:center; padding:20px 0; color:var(--text-muted); font-size:0.75rem; border-top:1px solid var(--card-border); margin-top:20px; }

/* Responsive */
@media (max-width:900px) {
  .charts-row { grid-template-columns:1fr; }
  .header { flex-direction:column; align-items:flex-start; }
}
@media print {
  body { background:#fff; color:#222; }
  .toggle-row, .filters-row, .expand-hint { display:none; }
  .chart-card, .kpi-card, .comp-card, .table-section { border:1px solid #ddd; background:#fff; break-inside:avoid; }
  .data-table th, .data-table td { color:#222; }
  .badge { border:1px solid #ccc; }
}
</style>

// ===== HELPERS =====
function jiraUrl(ticket) {
  if (!ticket || ticket === 'N/A') return null;
  return `https://snowflakecomputing.atlassian.net/browse/${ticket}`;
}
function filterByRange(arr) {
  if (currentRange === '30d') return arr;
  return arr.filter(r => r.period === '14d');
}
function priorityClass(p) {
  const l = (p||'').toLowerCase();
  if (l.includes('sev1') || l.includes('blocker') || l === 'highest' || l.includes('patchcritical')) return 'sev1';
  if (l.includes('sev2') || l === 'critical') return 'sev2';
  if (l === 'high') return 'high';
  return 'medium';
}
function statusClass(s) {
  const l = (s||'').toLowerCase();
  if (l.includes('closed') || l.includes('done')) return 'done';
  if (l.includes('invest') || l.includes('waiting')) return 'investigating';
  if (l.includes('backlog')) return 'backlog';
  if (l.includes('ready')) return 'ready';
  if (l.includes('in progress')) return 'in-progress';
  return 'open';
}
function trendArrowText(t) {
  if (t === 'degrading') return '↗ Degrading';
  if (t === 'improving') return '↘ Improving';
  if (t === 'stable-elevated') return '→ Stable (elevated)';
  return '→ Stable';
}

// ===== RENDER KPIs =====
function renderKPIs() {
  const inc = filterByRange(prodIncidents);
  const slo = filterByRange(prodSloAlerts);
  const incActive = inc.filter(i=>!i.context);
  const sloActive = slo.filter(i=>!i.context);
  const bugs = filterByRange(sevBugs);
  const bugsActive = bugs.filter(b=>!b.context);
  const bugsContext = bugs.filter(b=>b.context);
  const sup = filterByRange(supportCases);
  const allProd = [...inc, ...slo];
  const openCount = allProd.filter(i=>!i.context && !i.status.toLowerCase().includes('closed') && !i.status.toLowerCase().includes('done')).length;
  const closedCount = allProd.filter(i=>i.context || i.status.toLowerCase().includes('closed') || i.status.toLowerCase().includes('done')).length;
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card"><div class="label">PROD Incidents</div><div class="value ${incActive.length>2?'red':incActive.length>0?'orange':'green'}">${incActive.length}</div><div class="sub">${inc.filter(i=>i.context).length} closed (context)</div></div>
    <div class="kpi-card"><div class="label">SLO Alerts / Bugs</div><div class="value ${sloActive.length>5?'red':sloActive.length>0?'orange':'green'}">${sloActive.length}</div><div class="sub">${slo.filter(i=>i.context).length} closed/dup (context)</div></div>
    <div class="kpi-card"><div class="label">SNOW Sev1-High Bugs</div><div class="value ${bugsActive.length>10?'red':bugsActive.length>0?'orange':'green'}">${bugsActive.length}</div><div class="sub">${bugsContext.length} resolved (context)</div></div>
    <div class="kpi-card"><div class="label">Open / Closed (all PROD)</div><div class="value ${openCount>10?'red':openCount>3?'orange':'green'}">${openCount} <span style="font-size:1rem;color:var(--text-dim)">/ ${closedCount}</span></div><div class="sub">${sup.length} support case${sup.length!==1?'s':''}</div></div>
  `;
}

      datasets:[
        { label:'Incidents', data:data.map(d=>d.incidents), borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,0.1)', fill:false, tension:0.3, pointRadius:5, pointHoverRadius:7, borderWidth:2 },
        { label:'SLO Alerts', data:data.map(d=>d.sloAlerts), borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,0.1)', fill:false, tension:0.3, pointRadius:5, pointHoverRadius:7, borderWidth:2 },
        { label:'SNOW Sev1-High Bugs', data:data.map(d=>d.sevBugs), borderColor:'#a855f7', backgroundColor:'rgba(168,85,247,0.1)', fill:false, tension:0.3, pointRadius:5, pointHoverRadius:7, borderWidth:2 },
        { label:'Support Cases', data:data.map(d=>d.supportCases), borderColor:'#4a9eff', backgroundColor:'rgba(74,158,255,0.1)', fill:false, tension:0.3, pointRadius:5, pointHoverRadius:7, borderWidth:2 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:true, aspectRatio:2,
      plugins:{ tooltip:{ callbacks:{ afterLabel:function(ctx){ const d=data[ctx.dataIndex]; return d.label?'⚡ '+d.label:''; } } },
        legend:{ labels:{ color:'#94a3b8', usePointStyle:true, pointStyle:'circle', padding:16 } } },
      scales:{ x:{ ticks:{color:'#64748b'}, grid:{color:'rgba(42,45,55,0.5)'} }, y:{ beginAtZero:true, ticks:{color:'#64748b',stepSize:1}, grid:{color:'rgba(42,45,55,0.5)'} } }
    }
  });
}
function renderComponentChart() {
  const ctx = document.getElementById('componentChart').getContext('2d');
  if (compChartInstance) compChartInstance.destroy();
  const key14 = currentRange === '14d';
  const comps = componentHealth.filter(c => key14 ? (c.incidents14d+c.sloAlerts14d+c.sev12_14d+c.support14d)>0 : (c.incidents30d+c.sloAlerts30d+c.sev12_30d+c.support30d)>0 );
  compChartInstance = new Chart(ctx, {
    type:'bar',
    data:{
      labels: comps.map(c=>c.component),
      datasets:[
        { label:'Incidents', data:comps.map(c=>key14?c.incidents14d:c.incidents30d), backgroundColor:'rgba(239,68,68,0.7)' },
        { label:'SLO Alerts', data:comps.map(c=>key14?c.sloAlerts14d:c.sloAlerts30d), backgroundColor:'rgba(245,158,11,0.7)' },
        { label:'SNOW Bugs', data:comps.map(c=>key14?c.sev12_14d:c.sev12_30d), backgroundColor:'rgba(168,85,247,0.7)' },
        { label:'Support', data:comps.map(c=>key14?c.support14d:c.support30d), backgroundColor:'rgba(74,158,255,0.7)' }
      ]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:true, aspectRatio:1.4,
      plugins:{ legend:{ labels:{ color:'#94a3b8', usePointStyle:true, pointStyle:'rect', padding:12 } } },
      scales:{ x:{ stacked:true, beginAtZero:true, ticks:{color:'#64748b',stepSize:1}, grid:{color:'rgba(42,45,55,0.5)'} }, y:{ stacked:true, ticks:{color:'#e2e8f0'}, grid:{display:false} } }
    }
  });
}

// ===== RENDER TABLES =====
function getTableData() {
  if (currentTab === 'incidents') return { data:filterByRange(prodIncidents), cols:['ticket','component','issueType','priority','summary','status','created'] };
  if (currentTab === 'sloalerts') return { data:filterByRange(prodSloAlerts), cols:['ticket','component','issueType','priority','summary','status','created'] };
  if (currentTab === 'sevbugs') return { data:filterByRange(sevBugs), cols:['ticket','component','severity','type','summary','status','created'] };
  return { data:filterByRange(supportCases), cols:['ticket','component','severity','sfCase','summary','status','created'] };
}
function getUniqueValues(data, key) {
  return ['All', ...new Set(data.map(d=>d[key]).filter(Boolean))];
}
function renderFilters() {
  const { data } = getTableData();
  const compKey = 'component';
  const prioKey = (currentTab === 'incidents' || currentTab === 'sloalerts') ? 'priority' : 'severity';
  const comps = getUniqueValues(data, compKey);
  const prios = getUniqueValues(data, prioKey);
  const statuses = getUniqueValues(data, 'status');
  document.getElementById('filtersRow').innerHTML = `
    <select class="filter-select" onchange="filters.component=this.value;renderTable()">${comps.map(c=>`<option ${filters.component===c?'selected':''}>${c}</option>`).join('')}</select>
    <select class="filter-select" onchange="filters.priority=this.value;renderTable()">${prios.map(p=>`<option ${filters.priority===p?'selected':''}>${p}</option>`).join('')}</select>
    <select class="filter-select" onchange="filters.status=this.value;renderTable()">${statuses.map(s=>`<option ${filters.status===s?'selected':''}>${s}</option>`).join('')}</select>
  `;
}
function renderTable() {
  let { data, cols } = getTableData();
  const prioKey = (currentTab === 'incidents' || currentTab === 'sloalerts') ? 'priority' : 'severity';
  if (filters.component !== 'All') data = data.filter(d => d.component === filters.component);
  if (filters.priority !== 'All') data = data.filter(d => d[prioKey] === filters.priority);
  if (filters.status !== 'All') data = data.filter(d => d.status === filters.status);
  // Sort: active items first, then context; within each group apply user sort
  let active = data.filter(d => !d.context);
  let context = data.filter(d => d.context);
  if (sortState.col) {
    const sortFn = (a,b) => {
      const va = (a[sortState.col]||'').toString().toLowerCase();
      const vb = (b[sortState.col]||'').toString().toLowerCase();
      return sortState.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    };
    active = [...active].sort(sortFn);
    context = [...context].sort(sortFn);
  }
  const colLabels = { ticket:'Ticket', component:'Component', priority:'Priority', severity:'Severity', type:'Type', issueType:'Type', summary:'Summary', status:'Status', created:'Created', sfCase:'SF Case' };
  let html = '<table class="data-table"><thead><tr>';
  cols.forEach(c => {
    const arrow = sortState.col===c ? (sortState.asc?'▲':'▼') : '';
    html += `<th onclick="sortTable('${c}')">${colLabels[c]||c} <span class="sort-arrow">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';
  if (active.length === 0 && context.length === 0) {
    html += `<tr><td colspan="${cols.length}" style="text-align:center;padding:24px;color:var(--text-muted)">No issues in this view</td></tr>`;
  }
  // Render active rows
  const renderCell = (c, v) => {
    if (c === 'ticket') {
      const url = jiraUrl(v);
      return `<td>${url ? `<a href="${url}" target="_blank" rel="noopener">${v}</a>` : v}</td>`;
    } else if (c === 'priority' || c === 'severity') {
      return `<td><span class="badge ${priorityClass(v)}">${v}</span></td>`;
    } else if (c === 'status') {
      return `<td><span class="badge ${statusClass(v)}">${v}</span></td>`;
    } else if (c === 'issueType') {
      const cls = v === 'Incident' ? 'incident-type' : 'slo-type';
      return `<td><span class="badge ${cls}">${v}</span></td>`;
    } else {
      return `<td>${v}</td>`;
    }
  };
  active.forEach(row => {
    html += '<tr>';
    cols.forEach(c => html += renderCell(c, row[c] || ''));
    html += '</tr>';
  });
  // Separator + context rows
  if (context.length > 0) {
    html += `<tr><td colspan="${cols.length}" style="padding:10px 16px;color:var(--text-muted);font-size:0.75rem;font-style:italic;border-bottom:1px solid var(--card-border);background:rgba(42,45,55,0.3)">Resolved / closed / duplicate (for context)</td></tr>`;
    context.forEach(row => {
      html += '<tr class="context-row">';
      cols.forEach(c => html += renderCell(c, row[c] || ''));
      html += '</tr>';
    });
  }
  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
}
function sortTable(col) {
  if (sortState.col === col) sortState.asc = !sortState.asc;
  else { sortState.col = col; sortState.asc = true; }
  renderTable();
  renderFilters();
}

// ===== COMPONENT CARDS =====
function computeComponentTrend(compName) {
  const weeks = weeklyTrend.map(w => w.week);
  const allTickets = [
    ...filterByRange(prodIncidents),
    ...filterByRange(prodSloAlerts),
    ...filterByRange(sevBugs),
    ...filterByRange(supportCases)
  ].filter(t => t.component === compName);
  // Build week boundaries from weeklyTrend labels (e.g. "Mar 15-20", "Apr 4-10")
  // Assign each ticket to a week bucket by created date
  const weekBuckets = weeks.map(() => 0);
  const year = 2026;
  const monthMap = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  // Parse week ranges to get start dates
  const weekStarts = [];
  for (const w of weeks) {
    const m = w.match(/^(\w+)\s+(\d+)/);
    if (m) weekStarts.push(new Date(year, monthMap[m[1]], parseInt(m[2])));
    else weekStarts.push(new Date(0));
  }
  for (const t of allTickets) {
    const d = new Date(t.created);
    let assigned = false;
    for (let i = weekStarts.length - 1; i >= 0; i--) {
      if (d >= weekStarts[i]) { weekBuckets[i]++; assigned = true; break; }
    }
    if (!assigned && weekStarts.length) weekBuckets[0]++;
  }
  return weekBuckets;
}
function renderComponentCards() {
  const key14 = currentRange === '14d';
  document.getElementById('componentGrid').innerHTML = componentHealth.map((c,i) => `
    <div class="comp-card" onclick="this.classList.toggle('expanded')">
      <div class="comp-card-header">
        <div class="health-dot ${c.health}"></div>
        <div class="comp-name">${c.component}</div>
        <div class="trend-arrow ${c.trend}">${trendArrowText(c.trend)}</div>
      </div>
      <div class="comp-stats">
        <span>Incidents: <strong>${key14?c.incidents14d:c.incidents30d}</strong></span>
        <span>SLO Alerts: <strong>${key14?c.sloAlerts14d:c.sloAlerts30d}</strong></span>
        <span>SNOW Bugs: <strong>${key14?c.sev12_14d:c.sev12_30d}</strong></span>
        <span>Support: <strong>${key14?c.support14d:c.support30d}</strong></span>
      </div>
      <div class="comp-sparkline"><canvas id="spark-${i}" width="280" height="45"></canvas></div>
      <div class="expand-hint">Click to expand details</div>
      <div class="comp-details"><strong>Trend reasoning:</strong> ${c.trendReason}<br><br>${c.detail}</div>
    </div>
  `).join('');
  // Render sparklines after DOM is populated
  renderSparklines();
}
let sparkInstances = [];
function renderSparklines() {
  sparkInstances.forEach(c => c.destroy());
  sparkInstances = [];
  const trendColors = {
    degrading: { border:'#ef4444', bg:'rgba(239,68,68,0.15)' },
    improving: { border:'#22c55e', bg:'rgba(34,197,94,0.15)' },
    stable: { border:'#64748b', bg:'rgba(100,116,139,0.1)' },
    'stable-elevated': { border:'#f59e0b', bg:'rgba(245,158,11,0.15)' }
  };
  const data = currentRange === '14d' ? weeklyTrend.slice(-2) : weeklyTrend;
  const labels = data.map(d => d.week);
  componentHealth.forEach((c, i) => {
    const canvas = document.getElementById('spark-' + i);
    if (!canvas) return;
    const values = computeComponentTrend(c.component);
    const sliced = currentRange === '14d' ? values.slice(-2) : values;
    const colors = trendColors[c.trend] || trendColors.stable;
    const chart = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: sliced,
          borderColor: colors.border,
          backgroundColor: colors.bg,
          fill: true,
          tension: 0.3,
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: colors.border,
          pointBorderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { title: ctx => ctx[0].label, label: ctx => ctx.parsed.y + ' issues' },
          bodyFont: { size: 11 }, titleFont: { size: 11 }, padding: 6
        }},
        scales: {
          x: { display: false },
          y: { display: false, beginAtZero: true }
        },
        layout: { padding: { top: 2, bottom: 2, left: 0, right: 0 } }
      }
    });
    sparkInstances.push(chart);
  });
}

// ===== GLOBAL ACTIONS =====
function setRange(range) {
  currentRange = range;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.toggle-btn[onclick="setRange('${range}')"]`).classList.add('active');
  filters = { component:'All', priority:'All', status:'All' };
  sortState = { col:null, asc:true };
  renderAll();
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[['incidents','sloalerts','sevbugs','support'].indexOf(tab)].classList.add('active');
  filters = { component:'All', priority:'All', status:'All' };
  sortState = { col:null, asc:true };
  renderFilters();
  renderTable();
}
function renderAll() {
  renderKPIs();
  renderTrendChart();
  renderComponentChart();
  renderFilters();
  renderTable();
  renderComponentCards();
}

// ===== INIT =====
renderAll();
</script>
